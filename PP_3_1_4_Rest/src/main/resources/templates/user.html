<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; }
        .top-header { background-color: #343a40; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { min-height: 100vh; background-color: #f4f4f4; padding-top: 20px; }
        .sidebar .nav-link { background-color: #007bff; color: white; margin: 10px; border-radius: 4px; text-align: center; padding: 10px; }
        .main-content { padding: 20px; }
        .table-container { background-color: white; padding: 15px; }
    </style>
</head>
<body>
<div class="top-header">
    <div id="userInfo">Loading...</div>
    <div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link text-decoration-none text-white-50">Logout</button>
        </form>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <nav class="nav flex-column">
                <a class="nav-link active" href="/user">User</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <h1>User information-page</h1>
            <div class="table-container">
                <h5>About user</h5>
                <table class="table">
                    <thead><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Age</th><th>Email</th><th>Role</th></tr></thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script>
    async function loadUser() {
        const res = await fetch('/api/users/current');
        const user = await res.json();
        document.getElementById('userInfo').innerHTML = `${user.email} with roles: ${user.roles.map(r => r.name.replace('ROLE_', '')).join(', ')}`;
        const row = `
            <tr>
                <td>${user.id}</td>
                <td>${user.firstName || ''}</td>
                <td>${user.lastName || ''}</td>
                <td>${user.age || ''}</td>
                <td>${user.email}</td>
                <td>${user.roles.map(r => r.name.replace('ROLE_', '')).join(' ')}</td>
            </tr>
        `;
        document.getElementById('userTableBody').innerHTML = row;
    }
    window.addEventListener('load', loadUser);
</script>
</body>
</html>
