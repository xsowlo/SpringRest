<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add new user</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
        }
        .top-header {
            background-color: #343a40;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #f4f4f4;
            padding-top: 20px;
        }
        .sidebar .nav-link {
            background-color: #007bff;
            color: white;
            margin: 10px;
            border-radius: 4px;
            text-align: center;
            padding: 10px;
        }
        .sidebar .nav-link:hover {
            background-color: #0056b3;
        }
        .main-content {
            padding: 20px;
        }
        .form-container {
            background-color: white;
            padding: 30px 40px;
            max-width: 500px;
            width: 100%;
        }
        .form-container h5 {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-label {
            font-weight: normal;
            margin-bottom: 5px;
            display: block;
            text-align: center;
        }
        .form-control {
            background-color: #fff7c0;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-control-white {
            background-color: white;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .form-control-white:focus {
            background-color: white;
        }
        .form-control:focus {
            background-color: #fff7c0;
        }
        .btn-add {
            background-color: #007bff;
            color: white;
            border: none;
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }
        .role-select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
            background-color: white;
            text-align: center;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .top-links {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .top-links a {
            text-decoration: none;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="top-header">
    <div>
        <span th:text="${currentUser.email}">admin@mail.ru</span>
        with roles:
        <span th:each="role, iterStat : ${currentUser.roles}">
            <span th:text="${#strings.replace(role.name, 'ROLE_', '')}"></span><span th:if="${!iterStat.last}"> </span>
        </span>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link text-decoration-none text-white-50">Logout</button>
        </form>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <nav class="nav flex-column">
                <a class="nav-link active" href="/admin">Admin</a>
            </nav>
        </div>

        <div class="col-md-10 main-content">
            <h1 class="page-title">Admin panel</h1>

            <div class="top-links">
                <a href="/admin">Users table</a>
                <a href="/admin/user/new">New User</a>
            </div>

            <h5>Add new user</h5>

            <div class="form-container">
                <form th:action="@{/admin/user/save}" th:object="${user}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div>
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" th:field="*{username}" required>
                    </div>

                    <div>
                        <label class="form-label">First name</label>
                        <input type="text" class="form-control" th:field="*{firstName}" required>
                    </div>

                    <div>
                        <label class="form-label">Last name</label>
                        <input type="text" class="form-control" th:field="*{lastName}" required>
                    </div>

                    <div>
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control-white" th:field="*{age}" required>
                    </div>

                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" required>
                    </div>

                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control-white" id="password" name="password" required>
                    </div>

                    <div>
                        <label class="form-label">Role</label>
                        <select name="role" class="role-select">
                            <option value="ADMIN">ADMIN</option>
                            <option value="USER" selected>USER</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-add">Add new user</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
