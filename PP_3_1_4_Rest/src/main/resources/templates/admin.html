<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; }
        .top-header { background-color: #343a40; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .sidebar { min-height: 100vh; background-color: #f4f4f4; padding-top: 20px; }
        .sidebar .nav-link { background-color: #007bff; color: white; margin: 10px; border-radius: 4px; text-align: center; padding: 10px; }
        .main-content { padding: 20px; }
        .table-container { background-color: white; padding: 15px; }
        .btn-edit { background-color: #17a2b8; color: white; }
        .modal-form-control, .modal-form-control-white, .modal-role-select { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ced4da; }
        .modal-readonly { background-color: #e9ecef; }
    </style>
</head>
<body>

<div class="top-header">
    <div id="currentUserInfo">Loading...</div>
    <div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link text-decoration-none text-white-50">Logout</button>
        </form>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <nav class="nav flex-column">
                <a class="nav-link active" href="/admin">Admin</a>
            </nav>
        </div>
        <div class="col-md-10 main-content">
            <h1>Admin panel</h1>
            <div class="d-flex gap-3 mb-3">
                <a href="#" class="text-decoration-none" id="newUserLink">New User</a>
            </div>
            <div class="table-container">
                <h5>All users</h5>
                <table class="table">
                    <thead>
                    <tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Age</th><th>Email</th><th>Role</th><th>Edit</th><th>Delete</th></tr>
                    </thead>
                    <tbody id="userTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="userId">
                <input type="text" id="username" placeholder="Username" class="modal-form-control">
                <input type="text" id="firstName" placeholder="First name" class="modal-form-control">
                <input type="text" id="lastName" placeholder="Last name" class="modal-form-control">
                <input type="number" id="age" placeholder="Age" class="modal-form-control-white">
                <input type="email" id="email" placeholder="Email" class="modal-form-control">
                <input type="password" id="password" placeholder="Password (leave empty to keep current)" class="modal-form-control-white">
                <select id="roleSelect" class="modal-role-select">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveUserBtn">Save</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete user <span id="deleteUserName"></span>?</p>
                <input type="hidden" id="deleteUserId">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentUser = null;
    let users = [];
    let currentUserModal = null;
    let currentDeleteModal = null;

    async function loadCurrentUser() {
        const res = await fetch('/api/users/current');
        currentUser = await res.json();
        document.getElementById('currentUserInfo').innerHTML = `${currentUser.email} with roles: ${currentUser.roles.map(r => r.name.replace('ROLE_', '')).join(', ')}`;
    }

    async function loadUsers() {
        const res = await fetch('/api/users');
        users = await res.json();
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';
        users.forEach(user => {
            const rolesStr = user.roles.map(r => r.name.replace('ROLE_', '')).join(' ');
            const row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.firstName || ''}</td>
                    <td>${user.lastName || ''}</td>
                    <td>${user.age || ''}</td>
                    <td>${user.email}</td>
                    <td>${rolesStr}</td>
                    <td><button class="btn btn-edit btn-sm" onclick="openEditModal(${user.id})">Edit</button></td>
                    <td><button class="btn btn-danger btn-sm" onclick="openDeleteModal(${user.id})">Delete</button></td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', row);
        });
    }

    function openCreateModal() {
        document.getElementById('modalTitle').innerText = 'Add User';
        document.getElementById('userId').value = '';
        document.getElementById('username').value = '';
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('roleSelect').value = 'USER';
        if (currentUserModal) {
            currentUserModal.show();
        } else {
            currentUserModal = new bootstrap.Modal(document.getElementById('userModal'));
            currentUserModal.show();
        }
    }

    function openEditModal(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('modalTitle').innerText = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('firstName').value = user.firstName || '';
        document.getElementById('lastName').value = user.lastName || '';
        document.getElementById('age').value = user.age || '';
        document.getElementById('email').value = user.email;
        document.getElementById('password').value = '';
        const isAdmin = user.roles.some(r => r.name === 'ROLE_ADMIN');
        document.getElementById('roleSelect').value = isAdmin ? 'ADMIN' : 'USER';
        if (currentUserModal) {
            currentUserModal.show();
        } else {
            currentUserModal = new bootstrap.Modal(document.getElementById('userModal'));
            currentUserModal.show();
        }
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const username = document.getElementById('username').value.trim();
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const age = document.getElementById('age').value;
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const roleValue = document.getElementById('roleSelect').value;

        if (!username || !email) {
            alert('Username and Email are required');
            return;
        }

        let roles = [];
        if (roleValue === 'ADMIN') {
            roles = [{ name: 'ROLE_ADMIN' }, { name: 'ROLE_USER' }];
        } else {
            roles = [{ name: 'ROLE_USER' }];
        }

        const payload = { username, firstName, lastName, age: age ? parseInt(age) : null, email, roles };
        if (password) payload.password = password;

        let url = '/api/users';
        let method = 'POST';
        if (id) {
            url = `/api/users/${id}`;
            method = 'PUT';
            payload.id = parseInt(id);
        }

        const res = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            if (currentUserModal) {
                currentUserModal.hide();
            }
            await loadUsers();
        } else {
            const error = await res.text();
            alert('Error: ' + error);
        }
    }

    function openDeleteModal(id) {
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('deleteUserId').value = id;
        document.getElementById('deleteUserName').innerText = `${user.firstName} ${user.lastName} (${user.email})`;
        if (currentDeleteModal) {
            currentDeleteModal.show();
        } else {
            currentDeleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
            currentDeleteModal.show();
        }
    }

    async function deleteUser() {
        const id = document.getElementById('deleteUserId').value;
        const res = await fetch(`/api/users/${id}`, { method: 'DELETE' });
        if (res.ok) {
            if (currentDeleteModal) {
                currentDeleteModal.hide();
            }
            await loadUsers();
        } else {
            alert('Delete failed');
        }
    }

    document.getElementById('saveUserBtn').addEventListener('click', saveUser);
    document.getElementById('confirmDeleteBtn').addEventListener('click', deleteUser);
    document.getElementById('newUserLink').addEventListener('click', (e) => {
        e.preventDefault();
        openCreateModal();
    });

    window.addEventListener('load', async () => {
        await loadCurrentUser();
        await loadUsers();
    });
</script>
</body>
</html>
