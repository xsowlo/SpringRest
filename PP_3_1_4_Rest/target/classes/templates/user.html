<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .top-header {
            background-color: #343a40;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            min-height: 100vh;
            background-color: white;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
        }
        .sidebar .nav-link {
            color: #0d6efd;
            margin: 5px 15px;
            padding: 8px 15px;
            border-radius: 4px;
            text-align: left;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }
        .sidebar .nav-link:hover {
            background-color: #e9ecef;
        }
        .main-content {
            padding: 20px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .section-header {
            background-color: #f8f9fa;
            padding: 15px 20px;
            border: 1px solid #dee2e6;
            border-bottom: none;
            font-size: 1.1rem;
        }
        .table-container {
            background-color: white;
            border: 1px solid #dee2e6;
            border-top: none;
        }
        .table {
            margin-bottom: 0;
        }
        .table th, .table td {
            border-top: none;
            border-bottom: 1px solid #dee2e6;
            vertical-align: middle;
            padding: 12px;
        }
        .table thead th {
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
        }
        .table tbody tr {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div class="top-header">
    <div>
        <span id="userEmail">Loading...</span>
        with roles:
        <span id="userRoles"></span>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link text-decoration-none text-white-50">Logout</button>
        </form>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <nav class="nav flex-column">
                <a class="nav-link" href="/admin">Admin</a>
                <a class="nav-link active" href="/user">User</a>
            </nav>
        </div>

        <div class="col-md-10 main-content">
            <h1 class="page-title">User information-page</h1>

            <div class="section-header">
                About user
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody id="userTableBody">
                    <tr>
                        <td id="userId">-</td>
                        <td id="userFirstName">-</td>
                        <td id="userLastName">-</td>
                        <td id="userAge">-</td>
                        <td id="userEmailCell">-</td>
                        <td id="userRoleCell">-</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadCurrentUser() {
        try {
            const response = await fetch('/api/user/current');
            const user = await response.json();

            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userRoles').innerHTML = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');

            document.getElementById('userId').textContent = user.id;
            document.getElementById('userFirstName').textContent = user.firstName || '';
            document.getElementById('userLastName').textContent = user.lastName || '';
            document.getElementById('userAge').textContent = user.age || '';
            document.getElementById('userEmailCell').textContent = user.email;
            document.getElementById('userRoleCell').innerHTML = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
        } catch (error) {
            console.error('Error loading user:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadCurrentUser();
    });
</script>
</body>
</html>
