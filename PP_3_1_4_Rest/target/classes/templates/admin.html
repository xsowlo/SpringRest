<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .top-header {
            background-color: #343a40;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar {
            min-height: 100vh;
            background-color: white;
            padding-top: 20px;
            border-right: 1px solid #dee2e6;
        }
        .sidebar .nav-link {
            color: #0d6efd;
            margin: 5px 15px;
            padding: 8px 15px;
            border-radius: 4px;
            text-align: left;
        }
        .sidebar .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }
        .sidebar .nav-link:hover {
            background-color: #e9ecef;
        }
        .main-content {
            padding: 20px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 20px;
        }
        .nav-tabs {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 20px;
        }
        .nav-tabs .nav-link {
            color: #0d6efd;
            border: none;
            border-bottom: 2px solid transparent;
        }
        .nav-tabs .nav-link.active {
            color: #495057;
            background-color: white;
            border-bottom: 2px solid white;
        }
        .section-header {
            background-color: #f8f9fa;
            padding: 15px 20px;
            border: 1px solid #dee2e6;
            border-bottom: none;
            font-size: 1.1rem;
        }
        .table-container {
            background-color: white;
            border: 1px solid #dee2e6;
            border-top: none;
        }
        .table {
            margin-bottom: 0;
        }
        .table th, .table td {
            border-top: none;
            border-bottom: 1px solid #dee2e6;
            vertical-align: middle;
            padding: 12px;
        }
        .table thead th {
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
        }
        .btn-edit {
            background-color: #17a2b8;
            color: white;
            border: none;
            padding: 4px 12px;
        }
        .btn-edit:hover {
            background-color: #138496;
            color: white;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 4px 12px;
        }
        .btn-delete:hover {
            background-color: #c82333;
            color: white;
        }
        .modal-header {
            background-color: white;
            border-bottom: 1px solid #dee2e6;
            padding: 20px;
        }
        .modal-title {
            font-weight: normal;
            font-size: 1.25rem;
        }
        .modal-body {
            padding: 30px;
        }
        .form-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            text-align: center;
        }
        .form-control-white {
            background-color: white;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            max-width: 220px;
            padding: 8px 12px;
            box-sizing: border-box;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
        .form-control-readonly {
            background-color: #e9ecef;
            border: 1px solid #ced4da;
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            max-width: 220px;
            padding: 8px 12px;
            box-sizing: border-box;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
        .modal-footer {
            border-top: 1px solid #dee2e6;
            justify-content: flex-end;
            gap: 10px;
            padding: 20px;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 20px;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
            color: white;
        }
        .btn-primary {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 8px 20px;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
            color: white;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 20px;
        }
        .role-listbox {
            max-width: 220px;
            margin: 0 auto;
            display: block;
            width: 100%;
            padding: 6px;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
        }
        .role-hint {
            display: block;
            text-align: center;
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="top-header">
    <div>
        <span id="currentUserEmail">Loading...</span>
        with roles:
        <span id="currentUserRoles"></span>
    </div>
    <div>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-link text-decoration-none text-white-50">Logout</button>
        </form>
    </div>
</div>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar">
            <nav class="nav flex-column">
                <a class="nav-link active" href="/admin">Admin</a>
                <a class="nav-link" href="/user">User</a>
            </nav>
        </div>

        <div class="col-md-10 main-content">
            <h1 class="page-title">Admin panel</h1>

            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link active" href="/admin">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showAddModal(); return false;">New User</a>
                </li>
            </ul>

            <div class="section-header">
                All users
            </div>

            <div class="table-container">
                <table class="table" id="usersTable">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody">
                    <tr><td colspan="8" class="text-center">Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalLabel">Add new user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="userForm">
                <div class="modal-body">
                    <input type="hidden" name="id" id="userId">
                    <div>
                        <label class="form-label">ID</label>
                        <input type="text" id="userIdDisplay" class="form-control-readonly" readonly>
                    </div>
                    <div>
                        <label class="form-label">First name</label>
                        <input type="text" name="firstName" id="firstName" class="form-control-white">
                    </div>
                    <div>
                        <label class="form-label">Last name</label>
                        <input type="text" name="lastName" id="lastName" class="form-control-white">
                    </div>
                    <div>
                        <label class="form-label">Age</label>
                        <input type="number" name="age" id="age" class="form-control-white">
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" name="email" id="email" class="form-control-white">
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input type="password" name="password" id="password" class="form-control-white" placeholder="Password">
                    </div>
                    <div>
                        <label class="form-label">Role</label>
                        <select id="roleSelect" class="role-listbox" size="2" multiple>
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                        <small class="role-hint">используй Ctrl для выбора дополнительных ролей</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="deleteUserId">
                <div>
                    <label class="form-label">ID</label>
                    <input type="text" id="deleteUserIdDisplay" class="form-control-readonly" readonly>
                </div>
                <div>
                    <label class="form-label">First name</label>
                    <input type="text" id="deleteFirstName" class="form-control-readonly" readonly>
                </div>
                <div>
                    <label class="form-label">Last name</label>
                    <input type="text" id="deleteLastName" class="form-control-readonly" readonly>
                </div>
                <div>
                    <label class="form-label">Email</label>
                    <input type="text" id="deleteEmail" class="form-control-readonly" readonly>
                </div>
                <div>
                    <label class="form-label">Role</label>
                    <input type="text" id="deleteRole" class="form-control-readonly" readonly>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-danger" onclick="deleteUser()">Delete</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let userModal;
    let deleteModalObj;

    function getCsrfToken() {
        const name = 'XSRF-TOKEN';
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.startsWith(name + '=')) {
                return decodeURIComponent(cookie.substring(name.length + 1));
            }
        }
        return null;
    }

    async function loadCurrentUser() {
        try {
            const response = await fetch('/api/user/current', {
                headers: { 'X-XSRF-TOKEN': getCsrfToken() }
            });
            if (response.ok) {
                const user = await response.json();
                document.getElementById('currentUserEmail').textContent = user.email;
                const rolesSpan = document.getElementById('currentUserRoles');
                rolesSpan.innerHTML = user.roles?.map(r => r.name.replace('ROLE_', '')).join(' ') || 'No roles';
            }
        } catch (error) {
            console.error('Error loading current user:', error);
        }
    }

    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users', {
                headers: { 'X-XSRF-TOKEN': getCsrfToken() }
            });
            if (response.ok) {
                const users = await response.json();
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = user.id;
                    row.insertCell(1).textContent = user.firstName || '';
                    row.insertCell(2).textContent = user.lastName || '';
                    row.insertCell(3).textContent = user.age || '';
                    row.insertCell(4).textContent = user.email;
                    row.insertCell(5).innerHTML = user.roles?.map(r => r.name.replace('ROLE_', '')).join(' ') || '-';

                    const editCell = row.insertCell(6);
                    const editBtn = document.createElement('button');
                    editBtn.textContent = 'Edit';
                    editBtn.className = 'btn btn-edit btn-sm';
                    editBtn.onclick = () => showEditModal(user);
                    editCell.appendChild(editBtn);

                    const deleteCell = row.insertCell(7);
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'Delete';
                    deleteBtn.className = 'btn btn-delete btn-sm';
                    deleteBtn.onclick = () => showDeleteModal(user);
                    deleteCell.appendChild(deleteBtn);
                });
            }
        } catch (error) {
            console.error('Error loading users:', error);
        }
    }

    function showAddModal() {
        document.getElementById('userModalLabel').textContent = 'Add new user';
        document.getElementById('userId').value = '';
        document.getElementById('userIdDisplay').value = '';
        document.getElementById('firstName').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';

        const select = document.getElementById('roleSelect');
        Array.from(select.options).forEach(opt => opt.selected = false);
        const userOption = Array.from(select.options).find(opt => opt.value === 'USER');
        if (userOption) userOption.selected = true;

        userModal.show();
    }

    function showEditModal(user) {
        document.getElementById('userModalLabel').textContent = 'Edit user';
        document.getElementById('userId').value = user.id;
        document.getElementById('userIdDisplay').value = user.id;
        document.getElementById('firstName').value = user.firstName || '';
        document.getElementById('lastName').value = user.lastName || '';
        document.getElementById('age').value = user.age || '';
        document.getElementById('email').value = user.email;
        document.getElementById('password').value = '';

        const select = document.getElementById('roleSelect');
        Array.from(select.options).forEach(opt => opt.selected = false);

        if (user.roles) {
            user.roles.forEach(role => {
                const roleName = role.name.replace('ROLE_', '');
                const option = Array.from(select.options).find(opt => opt.value === roleName);
                if (option) option.selected = true;
            });
        }

        userModal.show();
    }

    async function saveUser(event) {
        event.preventDefault();

        const userId = document.getElementById('userId').value;
        const password = document.getElementById('password').value;

        if (!userId && (!password || password.trim().length === 0)) {
            alert('Password is required for new user!');
            return;
        }

        const userData = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value) || null,
            email: document.getElementById('email').value,
            role: Array.from(document.getElementById('roleSelect').selectedOptions).map(opt => opt.value).join(',')
        };

        if (password && password.trim().length > 0) {
            userData.password = password;
        }

        if (userId) {
            userData.id = parseInt(userId);
        }

        const url = userId ? `/api/admin/users/${userId}` : '/api/admin/users';
        const method = userId ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'X-XSRF-TOKEN': getCsrfToken()
                },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                userModal.hide();
                await loadUsers();
                await loadCurrentUser();
                document.getElementById('userForm').reset();
            } else {
                const errorText = await response.text();
                console.error('Error:', response.status, errorText);
                alert('Error saving user: ' + response.status);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error');
        }
    }

    function showDeleteModal(user) {
        document.getElementById('deleteUserId').value = user.id;
        document.getElementById('deleteUserIdDisplay').value = user.id;
        document.getElementById('deleteFirstName').value = user.firstName || '';
        document.getElementById('deleteLastName').value = user.lastName || '';
        document.getElementById('deleteEmail').value = user.email;
        document.getElementById('deleteRole').value = user.roles?.map(r => r.name.replace('ROLE_', '')).join(' ') || '';
        deleteModalObj.show();
    }

    async function deleteUser() {
        const userId = document.getElementById('deleteUserId').value;

        try {
            const response = await fetch(`/api/admin/users/${userId}`, {
                method: 'DELETE',
                headers: { 'X-XSRF-TOKEN': getCsrfToken() }
            });

            if (response.ok) {
                deleteModalObj.hide();
                await loadUsers();
                await loadCurrentUser();
            } else {
                alert('Error deleting user: ' + response.status);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Network error');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        userModal = new bootstrap.Modal(document.getElementById('userModal'));
        deleteModalObj = new bootstrap.Modal(document.getElementById('deleteModal'));

        document.getElementById('userForm').addEventListener('submit', saveUser);

        loadCurrentUser();
        loadUsers();
    });
</script>
</body>
</html>
